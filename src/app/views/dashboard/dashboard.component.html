<app-header></app-header>

<div id="mainDashboard" class="container">
  <h3>List of patients</h3>
  <br>
  <button type="button" class="btn btn-primary" (click)="newPatient()">New Patient</button>

  <table class="table table-hover">
    <thead>
      <tr>
        <th scope="col">ID</th>
        <th scope="col">Name</th>
        <th scope="col">DNI</th>
        <th scope="col">Telephone</th>
        <th scope="col">Email</th>
      </tr>
    </thead>
    <tbody>
      @for (patient of patients(); track patient.idPatient) {

      <tr (click)="editPatient(patient)">
        <th scope="row">{{patient.idPatient}}</th>
        <td>{{patient.name}}</td>
        <td>{{patient.dni}}</td>
        <td>{{patient.telephone}}</td>
        <td>{{patient.email}}</td>
      </tr>

      }
    </tbody>
  </table>
</div>



<app-footer></app-footer>
